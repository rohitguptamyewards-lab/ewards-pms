[phases.setup]
nixPkgs = ["...", "php83", "php83Extensions.pdo", "php83Extensions.pdo_sqlite", "php83Extensions.sqlite3", "php83Extensions.mbstring", "php83Extensions.openssl", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.bcmath", "php83Extensions.fileinfo"]

[phases.install]
cmds = [
    "mkdir -p /etc/nix && echo 'sandbox = false' > /etc/nix/nix.conf || true",
    "composer install --no-dev --optimize-autoloader",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force --seed && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
